<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PVWood ERP</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <!-- Login (placeholder auth until the Admin portal ships real login) -->
  <div id="login-view">
    <div class="login-card">
      <h1>PVWood&nbsp;ERP</h1>
      <p class="muted">v3</p>
      <label>Name <input id="name-input" placeholder="Your name"></label>
      <label>Role <select id="role-select"></select></label>
      <button id="login-btn" class="btn">Enter</button>
      <p class="hint">Placeholder sign-in — pick a role to preview its portals.</p>
    </div>
  </div>

  <!-- App shell -->
  <div id="app-view" hidden>
    <aside id="sidebar"></aside>
    <div id="main">
      <header id="topbar">
        <button id="menu-btn" class="btn btn-ghost" title="Menu">☰</button>
        <span id="page-title"></span>
        <span class="spacer"></span>
        <span id="user-label" class="muted"></span>
        <button id="logout-btn" class="btn btn-ghost">Logout</button>
      </header>
      <main id="content"></main>
    </div>
  </div>

  <!-- Shared framework -->
  <script src="js/api.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/nav.js"></script>
  <!-- One file per portal (each self-registers). Work on these in parallel. -->
  <script src="js/portals/portal_admin.js"></script>
  <script src="js/portals/portal_planning.js"></script>
  <script src="js/portals/portal_warehouse.js"></script>
  <script src="js/portals/portal_production.js"></script>
  <script src="js/portals/portal_qaqc.js"></script>
  <script src="js/portals/portal_accounting.js"></script>
  <script src="js/portals/portal_purchasing.js"></script>
  <!-- Bootstrap (after portals so the registry is populated) -->
  <script src="js/auth.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
